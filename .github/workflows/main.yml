name: Forme
on:
  schedule:
    - cron: '1,6,11,16,21,26,31,36,41,46,51,56 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        # أضفنا cloudscraper هنا لكي لا يظهر خطأ ModuleNotFoundError
        run: pip install requests beautifulsoup4 cloudscraper 
      - name: Run Scraper
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SAT_USER: ${{ secrets.SAT_USER }}
          SAT_PASS: ${{ secrets.SAT_PASS }}
        run: python Forme.py
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add last_keys_list.txt "for me.json" || echo "Files not found"
          git commit -m "Update for me.json" || exit 0
          git push
