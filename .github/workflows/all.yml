name: Merge All Keys Logic

on:
  push:
    paths:
      - '*.json'
  workflow_dispatch:

jobs:
  merge-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Merge JSON files
        run: |
          python -c "
          import json, os
          source_files = ['keys.json', 'feeds.json', 'bisskeys.json']
          all_data = []
          for filename in source_files:
              if os.path.exists(filename):
                  try:
                      with open(filename, 'r', encoding='utf-8') as f:
                          content = json.load(f)
                          if isinstance(content, list):
                              all_data.extend(content)
                  except Exception as e:
                      print(f'Error: {e}')
          with open('all.json', 'w', encoding='utf-8') as out:
              json.dump(all_data, out, indent=2, ensure_ascii=False)
          "

      - name: Commit and Push All Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add keys.json feeds.json bisskeys.json all.json
          git commit -m "Update satellite data and all.json" || exit 0
          git push
