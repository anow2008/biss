name: Update AFN Keys

on:
  schedule:
    - cron: '0 * * * *' # هيشتغل كل ساعة لوحده
  workflow_dispatch: # عشان تقدر تشغله يدوي

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Script
        env:
          MY_GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          MY_FORUM_COOKIES: ${{ secrets.MY_FORUM_COOKIES }}
        run: python softcam.py
