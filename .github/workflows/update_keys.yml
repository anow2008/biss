name: Update Satellite Keys

on:
  schedule:
    # بيشتغل أوتوماتيك كل 15 دقيقة (تقدر تغيرها براحتك)
    - cron: '*/15 * * * *'
  workflow_dispatch: # زرار للتشغيل اليدوي من تبويب Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12' # الإصدار المفضل لمشاريعك (OpenATV 7.6)

    - name: Install dependencies
      run: |
        pip install cloudscraper

    - name: Run Scraper
      run: python keys.py

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # إضافة ملف الـ JSON الناتج عن السكريبت
        git add keys.json
        
        # عمل Commit برمالة واضحة، مع استخدام [skip ci] لمنع التكرار اللانهائي
        git commit -m "Update keys [skip ci]" || exit 0
        
        # رفع التغييرات للمستودع
        git push
