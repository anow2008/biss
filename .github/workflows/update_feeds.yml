name: Update Satellite Feeds

on:
  schedule:
    - cron: '*/5 * * * *' # هيشتغل كل 5 دقائق بالظبط
  workflow_dispatch: # عشان لو حبيت تجربه يدوي في أي وقت

# الصلاحيات دي ضرورية جداً عشان يقدر يعمل Push للملفات
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # نسخة بايثون حديثة ومستقرة
          cache: 'pip' # عشان يحفظ المكتبات وما يحملهاش من الصفر كل 5 دقائق

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feeds.json
          # بنختبر لو فيه تغيير فعلاً عشان ما يعملش Error لو البيانات متبدلتش
          if git diff --staged --quiet; then
            echo "No changes in feeds.json"
          else
            git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            git push
          fi
