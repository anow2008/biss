name: Update Satellite Feeds

on:
  schedule:
    # تعديل الدقائق لتبدأ من الدقيقة 1 وتتكرر كل 5 دقائق (1, 6, 11, 16...) 
    # ده بيقلل احتمالية التأخير بسبب ضغط السيرفرات في المواعيد "المستديرة"
    - cron: '1,6,11,16,21,26,31,36,41,46,51,56 * * * *'
  workflow_dispatch: # عشان تقدر تشغله يدوي للتجربة

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # بنضيف الملف اللي اتحدث
          git add feeds.json
          
          # بنختبر لو فيه تغيير فعلي في المحتوى عشان نتجنب الـ Commits الفاضية
          if git diff --staged --quiet; then
            echo "No changes in feeds.json, skipping commit."
          else
            git commit -m "Auto-update: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            git push
          fi
